# =============================================================
# DON ALEX — Docker Compose
# Zero Trust: nunca hardcodear credenciales aquí.
# Usa archivos .env (nunca versionados) para los valores reales.
# =============================================================

services:
  # ── Base de datos ────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: don_alex_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - don_alex_network

  # ── Backend (FastAPI) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: don_alex_backend
    restart: unless-stopped
    env_file:
      # DATABASE_URL se lee directamente desde backend/.env con el
      # password percent-encoded. No se construye aquí para evitar
      # que caracteres especiales (@, $) rompan el parsing de la URL.
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - don_alex_network

  # ── Frontend (React + Vite) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: don_alex_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - don_alex_network

  # ── Nginx (Reverse Proxy) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: don_alex_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - don_alex_network

volumes:
  pgdata:
    driver: local

networks:
  don_alex_network:
    driver: bridge
