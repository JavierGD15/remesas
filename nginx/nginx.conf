# =============================================================
# DON ALEX — Nginx Reverse Proxy
# Unifica frontend y backend bajo un único dominio/puerto (80).
# Elimina el error de Mixed Content (HTTPS → HTTP).
# =============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name _;

        # ── API ────────────────────────────────────────────────
        # Todas las rutas que empiecen con /api/ se envían al backend.
        # Se elimina el prefijo /api antes de reenviar (rewrite interno).
        location /api/ {
            proxy_pass         http://backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts generosos para llamadas a Frankfurter API
            proxy_connect_timeout 15s;
            proxy_read_timeout    30s;
        }

        # ── Frontend ───────────────────────────────────────────
        # Todo lo demás se reenvía al servidor de desarrollo Vite.
        # El header Upgrade/Connection habilita el HMR (WebSocket).
        location / {
            proxy_pass         http://frontend/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
